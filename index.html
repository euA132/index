<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro | Gestão de Gastos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161b2c; --primary: #10b981; 
            --text: #ffffff; --muted: #94a3b8; --danger: #f43f5e; --accent: #334155;
        }
        * { box-sizing: border-box; transition: 0.2s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 480px; padding: 20px; display: none; }
        .card { background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }

        /* Navegação Superior */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-weight: 700; font-size: 14px; }
        .tab-btn.active { background: var(--primary); color: #064e3b; }

        /* Formulários */
        .input-group { margin-bottom: 15px; }
        .label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
        input, select { width: 100%; padding: 14px; background: #0b0f1a; border: 1px solid #2d3748; border-radius: 12px; color: white; font-size: 15px; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; background: var(--primary); color: #064e3b; font-size: 16px; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: white; margin-top: 15px; font-size: 14px; }

        /* Lista de Gastos Estilizada */
        .gasto-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .gasto-item b { display: block; font-size: 15px; color: white; }
        .gasto-item span { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
        .val-text { font-weight: 800; font-size: 18px; color: var(--primary); }

        .total-card { background: linear-gradient(135deg, #10b981, #059669); padding: 25px; border-radius: 20px; text-align: center; color: #064e3b; margin-top: 25px; }
        .total-card h2 { margin: 5px 0 0 0; font-size: 34px; font-weight: 800; }

        #auth-screen { display: block; align-self: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="card" id="auth-card">
            <h2 id="auth-title" style="margin-bottom: 5px;">Finance Pro 🚀</h2>
            <p id="auth-subtitle" style="text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 30px;">Introduz o teu e-mail para continuar</p>
            
            <div class="input-group">
                <span class="label">E-mail Verdadeiro</span>
                <input type="email" id="email" placeholder="exemplo@gmail.com">
            </div>
            
            <div class="input-group">
                <span class="label">Palavra-passe</span>
                <input type="password" id="pass" placeholder="Mínimo 6 caracteres">
            </div>

            <button class="btn" id="main-auth-btn" onclick="handleAuth()">Entrar na Conta</button>
            <button class="btn btn-outline" id="switch-auth-btn" onclick="toggleAuthMode()">Não tens conta? Regista-te</button>
        </div>
    </div>

    <div id="app-screen" class="container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-home" onclick="showTab('home')">📊 Dashboard</button>
            <button class="tab-btn" id="btn-profile" onclick="showTab('profile')">⚙️ Conta</button>
        </div>

        <div id="view-home">
            <div class="card">
                <h2 style="font-size: 20px; text-align: left; margin-bottom: 20px;">Novo Gasto</h2>
                <input type="text" id="desc" placeholder="O que compraste?">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="valor" placeholder="0.00€" style="flex: 1.2;">
                    <select id="cat" style="flex: 1;">
                        <option value="Alimentação">🍎 Comida</option>
                        <option value="Transporte">🚗 Transporte</option>
                        <option value="Lazer">🍿 Lazer</option>
                        <option value="Casa">🏠 Casa</option>
                        <option value="Saúde">💊 Saúde</option>
                        <option value="Outros">⚙️ Outros</option>
                    </select>
                </div>
                <button class="btn" onclick="addGasto()">+ Adicionar</button>
            </div>

            <div id="lista" style="margin-top: 25px; max-height: 280px; overflow-y: auto; padding-right: 5px;"></div>

            <div class="total-card">
                <small style="font-weight: 700; opacity: 0.8;">BALANÇO TOTAL</small>
                <h2 id="total-text">0.00€</h2>
            </div>
        </div>

        <div id="view-profile" style="display: none;">
            <div class="card">
                <h2>Definições</h2>
                <p style="color: var(--muted); font-size: 14px;">Sessão iniciada como:<br><b id="user-display" style="color: white;"></b></p>
                <hr style="border: 0; border-top: 1px solid var(--accent); margin: 25px 0;">
                
                <div class="input-group">
                    <span class="label">Mudar Palavra-passe</span>
                    <input type="password" id="new-pass" placeholder="Nova password">
                </div>
                <button class="btn" onclick="updatePassword()" style="background: var(--accent); color: white;">Atualizar Senha</button>
                
                <button class="btn" onclick="logout()" style="margin-top: 40px; background: var(--danger); color: white;">Terminar Sessão</button>
            </div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://vuhtwixigulqypnukvld.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_-u3dW2EAEo00YITWpE_jOw_hNCPpANJ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginMode = true;

    // --- TROCAR ENTRE LOGIN E REGISTO ---
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Bem-vindo de volta! 🚀" : "Criar Conta ✨";
        document.getElementById('main-auth-btn').innerText = isLoginMode ? "Entrar na Conta" : "Finalizar Registo";
        document.getElementById('switch-auth-btn').innerText = isLoginMode ? "Não tens conta? Regista-te" : "Já tens conta? Faz login";
    }

    // --- AUTENTICAÇÃO REAL ---
    async function handleAuth() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;

        if (!email || pass.length < 6) return alert("Insere um e-mail válido e senha (mín. 6 chars)");

        if (isLoginMode) {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Erro: " + error.message); else checkUser();
        } else {
            const { error } = await supabaseClient.auth.signUp({ email, password: pass });
            if (error) alert("Erro no registo: " + error.message); 
            else alert("Conta criada! Já podes entrar.");
        }
    }

    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('user-display').innerText = user.email;
            loadGastos();
        }
    }

    // --- NAVEGAÇÃO ---
    function showTab(tab) {
        document.getElementById('view-home').style.display = tab === 'home' ? 'block' : 'none';
        document.getElementById('view-profile').style.display = tab === 'profile' ? 'block' : 'none';
        document.getElementById('btn-home').className = tab === 'home' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-profile').className = tab === 'profile' ? 'tab-btn active' : 'tab-btn';
    }

    // --- GESTÃO DE DADOS ---
    async function loadGastos() {
        const { data, error } = await supabaseClient.from('gastos').select('*').order('created_at', { ascending: false });
        const lista = document.getElementById('lista');
        let total = 0; lista.innerHTML = '';

        if (data) {
            data.forEach(g => {
                total += parseFloat(g.valor);
                lista.innerHTML += `
                    <div class="gasto-item">
                        <div><b>${g.descricao}</b><span>${g.categoria}</span></div>
                        <div class="val-text">${parseFloat(g.valor).toFixed(2)}€</div>
                    </div>`;
            });
        }
        document.getElementById('total-text').innerText = total.toFixed(2) + "€";
    }

    async function addGasto() {
        const d = document.getElementById('desc').value;
        const v = document.getElementById('valor').value;
        const c = document.getElementById('cat').value;
        if (!d || !v) return;

        const { error } = await supabaseClient.from('gastos').insert([{ descricao: d, valor: v, categoria: c }]);
        if (!error) {
            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
            loadGastos();
        }
    }

    async function updatePassword() {
        const newP = document.getElementById('new-pass').value;
        if (newP.length < 6) return alert("Mínimo 6 caracteres!");
        const { error } = await supabaseClient.auth.updateUser({ password: newP });
        if (error) alert(error.message); else alert("Password atualizada!");
    }

    async function logout() { await supabaseClient.auth.signOut(); location.reload(); }

    checkUser();
</script>
</body>
</html>
